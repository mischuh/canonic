version: 1

project:
  name: walking-skeleton
  default_connection: warehouse_pg

# host/port/user/dbname are rewritten by the e2e conftest with live container
# coordinates; the password is supplied via the CANONIC_PG_PASSWORD env var.
connections:
  - id: warehouse_pg
    type: postgres
    params:
      host: localhost
      port: 5432
      user: postgres
      dbname: postgres
      schema: analytics
    credentials_ref: env:CANONIC_PG_PASSWORD

llm:
  provider: openai_compatible
  base_url: http://127.0.0.1:8765/v1
  model: stub-model

telemetry:
  enabled: false
