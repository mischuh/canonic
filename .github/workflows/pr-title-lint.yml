name: pr-title-lint

# Squash-merging a PR uses the PR title as the commit message on main, which is what
# release-please parses. commitlint.yml only checks individual commits on the branch,
# not the title, so a non-conventional title still slips through and release-please
# silently skips the release (see PR #228).
on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  pr-title-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
