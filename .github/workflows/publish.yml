name: publish

# Fires when release-please merges a Release PR and pushes the resulting
# version tag (see .github/workflows/release-please.yml).
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  npm-publish:
    # Disabled: no NPM_TOKEN secret exists yet, so this job fails every release
    # (ENEEDAUTH). The npm channel is still a scaffold — see the NOTE below and
    # SPEC-E1-foundation-config-distribution.md §5. Re-enable once NPM_TOKEN is
    # set and the binary-distribution design lands.
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Sync package.json version to tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      # NOTE: this is a scaffold, not a functional binary distribution.
      # SPEC-E1-foundation-config-distribution.md §5 lists the npm scope and
      # binary-distribution mechanism as an open question. bin/canon.js is a
      # stub that tells users to install via pip/uv until that design lands.
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/mischuh/canonic:${{ github.ref_name }}
            ghcr.io/mischuh/canonic:latest

  homebrew-bump:
    runs-on: ubuntu-latest
    steps:
      # TODO: bump the Homebrew formula once one exists (see
      # SPEC-E1-foundation-config-distribution.md §5, "Homebrew" channel).
      # Not implemented yet — no tap/formula has been created.
      - name: Homebrew formula bump (not implemented)
        run: |
          echo "TODO: Homebrew formula bump not implemented yet — see SPEC-E1 §5."
