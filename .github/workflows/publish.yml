name: publish

# Fires when release-please merges a Release PR and pushes the resulting
# version tag (see .github/workflows/release-please.yml).
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  pypi-publish:
    # Uses PyPI Trusted Publishing (OIDC) — no token secret needed, but the
    # `pypi` environment and a pending trusted publisher must be configured on
    # PyPI first (one-time maintainer setup, see SETUP.md).
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish

  docker-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/mischuh/canonic:${{ github.ref_name }}
            ghcr.io/mischuh/canonic:latest
