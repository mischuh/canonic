version: 1

project:
  name: saas-analytics-demo
  default_connection: saas_duckdb

connections:
  - id: saas_duckdb
    type: duckdb
    params:
      path: saas.duckdb   # bundled pre-built warehouse; see scripts/build.sh to regenerate

llm:
  provider: openai_compatible
  base_url: http://127.0.0.1:11434/v1   # Ollama; swap for OpenAI/Anthropic as needed
  model: gemma-4-e4b-it-4bit
  api_key_ref: env:CANON_LLM_API_KEY

reconcile:
  strict_contradictions: false
  auto_apply:
    enabled: false   # this example ships hand-curated semantics; review before applying

telemetry:
  enabled: false   # local event log only — nothing leaves the machine
