name: tracks
connection: chinook_pg
table: 'chinook."Track"'
grain: [TrackId]
description: "One row per track in the music catalog. AlbumId and GenreId are nullable (some tracks have no album or genre)."

columns:
  - { name: TrackId,      type: int,     nullable: false }
  - { name: Name,         type: string,  nullable: false }
  - { name: AlbumId,      type: int,     nullable: true  }
  - { name: MediaTypeId,  type: int,     nullable: false }
  - { name: GenreId,      type: int,     nullable: true  }
  - { name: Composer,     type: string,  nullable: true  }
  - { name: Milliseconds, type: int,     nullable: false }
  - { name: Bytes,        type: int,     nullable: true  }
  - { name: UnitPrice,    type: decimal, nullable: false }

measures:
  - name: catalog_size
    expr: 'count("TrackId")'
    additivity: additive
  - name: total_duration_ms
    expr: 'sum("Milliseconds")'
    additivity: additive
  - name: avg_duration_ms
    expr: 'avg("Milliseconds")'
    additivity: non_additive

dimensions:
  - { name: track_name,  column: Name }
  - { name: composer,    column: Composer }
  - { name: unit_price,  column: UnitPrice }
  - { name: genre_id,    column: GenreId }
  - { name: album_id,    column: AlbumId }
  - { name: media_type_id, column: MediaTypeId }

joins:
  - to: albums
    on: 'tracks."AlbumId" = albums."AlbumId"'
    relationship: many_to_one
  - to: genres
    on: 'tracks."GenreId" = genres."GenreId"'
    relationship: many_to_one
  - to: media_types
    on: 'tracks."MediaTypeId" = media_types."MediaTypeId"'
    relationship: many_to_one

meta:
  provenance: human_curated
