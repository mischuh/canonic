name: employees
connection: chinook_pg
table: 'chinook."Employee"'
grain: [EmployeeId]
description: "One row per employee. Support reps appear here and link to customers via SupportRepId. ReportsTo is a self-referential FK for the management hierarchy."

columns:
  - { name: EmployeeId, type: int,       nullable: false }
  - { name: LastName,   type: string,    nullable: false }
  - { name: FirstName,  type: string,    nullable: false }
  - { name: Title,      type: string,    nullable: true  }
  - { name: ReportsTo,  type: int,       nullable: true  }
  - { name: BirthDate,  type: timestamp, nullable: true  }
  - { name: HireDate,   type: timestamp, nullable: true  }
  - { name: City,       type: string,    nullable: true  }
  - { name: State,      type: string,    nullable: true  }
  - { name: Country,    type: string,    nullable: true  }
  - { name: Email,      type: string,    nullable: true  }

dimensions:
  - { name: employee_title, column: Title }
  - { name: country,        column: Country }
  - { name: city,           column: City }
  - { name: hire_date,      column: HireDate }

meta:
  provenance: human_curated
