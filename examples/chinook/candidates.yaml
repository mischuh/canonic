# Local model candidates for the Chinook E10 accuracy baseline.
# Run from examples/chinook/:
#   canon eval baseline --candidates candidates.yaml --dataset eval/grain_cases.jsonl
#
# Swap base_url / model to point at your running local server (Ollama, vLLM, LM Studio, llama.cpp).
# A hosted endpoint differs only by base_url and api_key_ref (SPEC-E10 §2, S1-AC2).
candidates:
  - name: gemma-4-12B-it-qat-4bit (local, Ollama)
    provider: openai_compatible
    base_url: http://127.0.0.1:11434/v1
    model: gemma-4-12B-it-qat-4bit
  - name: gemma-4-e2b-it-4bit (local, Ollama)
    provider: openai_compatible
    base_url: http://127.0.0.1:11434/v1
    model: gemma-4-e2b-it-4bit

