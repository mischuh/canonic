name: orders
connection: jaffle_dbt
table: main.orders
grain:
- order_id
columns:
- name: order_id
  type: int
  nullable: true
- name: customer_id
  type: int
  nullable: true
- name: store_id
  type: int
  nullable: true
- name: ordered_at
  type: timestamp
  nullable: true
- name: subtotal
  type: decimal
  nullable: true
- name: tax_paid
  type: decimal
  nullable: true
- name: amount
  type: decimal
  nullable: true
- name: count_food_items
  type: int
  nullable: true
- name: count_drink_items
  type: int
  nullable: true
- name: count_items
  type: int
  nullable: true
measures:
- name: revenue
  expr: sum(amount)
  additivity: additive
- name: order_count
  expr: count(order_id)
  additivity: additive
- name: total_tax_paid
  expr: sum(tax_paid)
  additivity: additive
dimensions:
- name: ordered_at
  column: ordered_at
  label: Order Date
  aliases: [order_date, bestelldatum]
joins:
- to: customers
  on: orders.customer_id = customers.customer_id
  relationship: many_to_one
- to: stores
  on: orders.store_id = stores.store_id
  relationship: many_to_one
meta:
  source_fingerprint: 
    sha256:e4237639505790bd460c237d068fd8652388af82b3e56c0c11e68ee69ba87ce1
