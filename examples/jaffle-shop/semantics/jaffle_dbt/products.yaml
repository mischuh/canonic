name: products
connection: jaffle_dbt
table: main.products
grain:
- product_id
columns:
- name: product_id
  type: int
  nullable: true
- name: name
  type: string
  nullable: true
- name: type
  type: string
  nullable: true
- name: price
  type: decimal
  nullable: true
- name: description
  type: string
  nullable: true
measures:
- name: row_count
  expr: count(*)
  additivity: additive
- name: total_price
  expr: sum(price)
  additivity: additive
dimensions:
- name: name
  column: name
  label: Product Name
  aliases: [produktname]
- name: type
  column: type
  label: Product Type
  aliases: [product_type, produkttyp, product_category]
- name: description
  column: description
  label: Product Description
  aliases: [produktbeschreibung, beschreibung]
joins: []
meta:
  source_fingerprint: 
    sha256:f437284c4eab36711d55c07a37214ee0f36a812edce81811f3f4951cfaff5dc4
