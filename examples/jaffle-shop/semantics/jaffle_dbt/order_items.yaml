name: order_items
connection: jaffle_dbt
table: main.order_items
grain:
- order_item_id
columns:
- name: order_item_id
  type: int
  nullable: true
- name: order_id
  type: int
  nullable: true
- name: product_id
  type: int
  nullable: true
- name: quantity
  type: int
  nullable: true
measures:
- name: units_sold
  expr: sum(quantity)
  additivity: additive
dimensions: []
joins:
- to: orders
  on: order_items.order_id = orders.order_id
  relationship: many_to_one
- to: products
  on: order_items.product_id = products.product_id
  relationship: many_to_one
meta:
