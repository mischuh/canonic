name: stores
connection: jaffle_dbt
table: main.stores
grain:
- store_id
columns:
- name: store_id
  type: int
  nullable: true
- name: name
  type: string
  nullable: true
- name: opened_at
  type: date
  nullable: true
- name: tax_paid
  type: decimal
  nullable: true
measures:
- name: row_count
  expr: count(*)
  additivity: additive
- name: total_tax_paid
  expr: sum(tax_paid)
  additivity: additive
dimensions:
- name: name
  column: name
  label: Store Name
  aliases: [filialname]
- name: opened_at
  column: opened_at
  label: Opening Date
  aliases: [open_date, opened_date, eröffnungsdatum]
joins: []
meta:
  source_fingerprint: 
    sha256:cc7439ef7d8948661e6fa8384da70f2459b4407ebe8643736cfa94da825d3f88
