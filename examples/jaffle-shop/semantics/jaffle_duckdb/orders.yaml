name: orders
connection: jaffle_duckdb
table: main.orders
grain:
- order_id
columns:
- name: order_id
  type: int
  nullable: false
- name: customer_id
  type: int
  nullable: false
- name: store_id
  type: int
  nullable: true
- name: ordered_at
  type: timestamp
  nullable: false
- name: subtotal
  type: decimal
  nullable: true
- name: tax_paid
  type: decimal
  nullable: true
- name: amount
  type: decimal
  nullable: true
- name: bank_transfer_amount
  type: decimal
  nullable: true
- name: credit_card_amount
  type: decimal
  nullable: true
- name: coupon_amount
  type: decimal
  nullable: true
- name: gift_card_amount
  type: decimal
  nullable: true
- name: count_food_items
  type: int
  nullable: true
- name: count_drink_items
  type: int
  nullable: true
- name: count_items
  type: int
  nullable: true
measures:
- name: revenue
  expr: sum(amount)
  additivity: additive
- name: order_count
  expr: count(order_id)
  additivity: additive
- name: total_tax_paid
  expr: sum(tax_paid)
  additivity: additive
dimensions:
- name: ordered_at
  column: ordered_at
joins:
- to: customers
  on: orders.customer_id = customers.customer_id
  relationship: many_to_one
- to: stores
  on: orders.store_id = stores.store_id
  relationship: many_to_one
meta:
  source_fingerprint: 
    sha256:f318669e5eb89a1442f2eaa9c77b0ce8d593dfa1ead6bcc8e7c91902871c6ad3
