name: customers
connection: jaffle_duckdb
table: main.customers
grain:
- customer_id
columns:
- name: customer_id
  type: int
  nullable: false
- name: first_name
  type: string
  nullable: false
- name: last_name
  type: string
  nullable: false
- name: email
  type: string
  nullable: true
- name: created_at
  type: date
  nullable: false
- name: customer_type
  type: string
  nullable: true
