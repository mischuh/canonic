  aliases: [nachname, lastname, familienname]
- name: email
  column: email
  label: Email Address
  aliases: [email_adresse, mailadresse]
- name: created_at
  column: created_at
  label: Customer Since
  aliases: [signup_date, created_date, anmeldedatum]
- name: customer_type
  column: customer_type
  label: Customer Type
  aliases: [customer_segment, kundentyp]
- name: customer_id
  column: customer_id
  label: Customer ID
  aliases: [kundennummer, kunden_id]
joins: []
