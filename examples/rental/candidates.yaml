# Candidate local models for the E10 baseline harness (SPEC-E10 §7, GH-66).
# Copy, edit to point at your running local servers, then:
#   canonic eval baseline --candidates candidates.yaml
#
# Each entry mirrors a canonic.yaml `llm` block. `openai_compatible` covers local runtimes
# (Ollama, vLLM, LM Studio, llama.cpp, TGI) and hosted endpoints — they differ only by
# `base_url` and whether a key is needed. Local servers usually need no key (omit api_key_ref).
candidates:
  - name: gemma-4-e2b-it-4bit (small, draft)
    provider: openai_compatible
    base_url: http://127.0.0.1:11434/v1
    model: gemma-4-e2b-it-4bit

  - name: DeepSeek-R1-0528-Qwen3-8B-MLX-4bit (mid)
    provider: openai_compatible
    base_url: http://127.0.0.1:11434/v1
    model: DeepSeek-R1-0528-Qwen3-8B-MLX-4bit
