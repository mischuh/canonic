version: 1

project:
  name: dutch-railway-demo
  default_connection: railway_duckdb

connections:
  - id: railway_duckdb
    type: duckdb
    params:
      path: dutch_railway.duckdb   # relative to this canonic.yaml; local file, no credentials

  # E3 definition connector: a compiled dbt manifest.json (dbt-duckdb, schema v12). No live
  # database, no execution — Canonic parses the manifest into modeling-tier evidence (grain,
  # FK joins, descriptions) that outranks raw DuckDB introspection during reconciliation.
  - id: railway_dbt
    type: dbt
    params:
      manifest_path: dbt/manifest.json   # relative to this canonic.yaml

llm:
  provider: openai_compatible
  base_url: http://127.0.0.1:11434/v1  # Ollama; swap for OpenAI/Anthropic in Phase 1
  model: gemma-4-12B-it-qat-4bit
  api_key_ref: env:CANONIC_LLM_API_KEY

reconcile:
  strict_contradictions: false   # set to true to gate CI on any contradiction (exit 14)
  auto_apply:
    enabled: false               # propose-only by default; reviewed diffs become the commit

telemetry:
  enabled: false   # local event log only — nothing is sent off-machine

runtime:
  air_gapped: false   # set to true to enforce local-only endpoints at load time (SPEC-E16 §9)
