# Candidate local models for the E10 baseline harness (SPEC-E10 §7, GH-66).
# Copy, edit to point at your running local servers, then:
#   canon eval baseline --candidates candidates.yaml
#
# Each entry mirrors a canon.yaml `llm` block. `openai_compatible` covers local runtimes
# (Ollama, vLLM, LM Studio, llama.cpp, TGI) and hosted endpoints — they differ only by
# `base_url` and whether a key is needed. Local servers usually need no key (omit api_key_ref).
candidates:
  - name: gemma-4-e2b-it-4bit (small, draft)
    provider: openai_compatible
    base_url: http://127.0.0.1:8765/v1
    model: gemma-4-e2b-it-4bit

  - name: gemma-4-12B-it-qat-4bit (mid)
    provider: openai_compatible
    base_url: http://127.0.0.1:8765/v1
    model: gemma-4-12B-it-qat-4bit

  # A hosted openai_compatible endpoint differs only by base_url + key (SPEC-E10 §2, S1-AC2):
  # - name: hosted-strong (reconcile candidate)
  #   provider: openai_compatible
  #   base_url: https://api.your-vendor.com/v1
  #   model: your-strong-model
  #   api_key_ref: env:CANON_LLM_KEY
